server {
    listen $PORT;
    server_name _;
    root /app;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache images and fonts aggressively — content-addressed, never change
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CSS and JS — version-parameterised in HTML; short cache so updates propagate
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Handle clean URLs for legal pages
    location /privacy-policy {
        try_files $uri $uri/ /privacy-policy/index.html;
    }

    location /cookie-policy {
        try_files $uri $uri/ /cookie-policy/index.html;
    }

    # Default routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
